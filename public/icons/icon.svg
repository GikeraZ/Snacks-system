<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="translate(256,256) scale(1.1)">
    <!-- Cup body -->
    <path d="M-100-40 L-100 60 Q-100 110 -50 130 L50 130 Q100 110 100 60 L100-40 Z"
          fill="white" opacity="0.95"/>
    <!-- Cup rim -->
    <rect x="-110" y="-55" width="220" height="20" rx="10" fill="white" opacity="0.95"/>
    <!-- Handle -->
    <path d="M100-10 Q160-10 160 40 Q160 90 100 70"
          fill="none" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.85"/>
    <!-- Steam lines -->
    <path d="M-30-65 Q-20-90 -10-65" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    <path d="M10-75 Q20-100 30-75" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    <path d="M50-65 Q60-90 70-65" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    <!-- Coffee wave -->
    <path d="M-70 20 Q-35 0 0 20 Q35 40 70 20" fill="none" stroke="#F97316" stroke-width="5" opacity="0.3"/>
  </g>
</svg>
